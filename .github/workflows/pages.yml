name: Deploy AURUM Suite to GitHub Pages

# Pubblica le app single-file su GitHub Pages.
# Copia tutti gli HTML del progetto e genera una landing (index.html)
# che raccoglie i tre siti come "AURUM Suite".
on:
  push:
    branches: [main]
    paths:
      - "*.html"
      - .github/workflows/pages.yml
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Una sola deploy concorrente; non annullare quelle in corso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepara contenuto del sito
        run: |
          mkdir -p _site
          # Copia tutte le app single-file presenti nella root del repo
          cp ./*.html _site/ 2>/dev/null || true
          # Genera la landing "AURUM Suite" come index.html
          cat > _site/index.html <<'HTML'
          <!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"/>
          <meta name="viewport" content="width=device-width,initial-scale=1"/>
          <title>AURUM Suite — KID Digital Wealth</title>
          <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet"/>
          <style>
          :root{--gold:#e7b54a;--green:#23d18b;--blue:#48a0ff}
          *{box-sizing:border-box;margin:0;padding:0}
          body{font-family:'JetBrains Mono',monospace;background:
            radial-gradient(1100px 500px at 85% -10%,rgba(72,160,255,.06),transparent 60%),
            radial-gradient(900px 460px at 0% 0%,rgba(231,181,74,.06),transparent 55%),#06090f;
            color:#cdd9ee;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px}
          .brand{display:flex;align-items:center;gap:14px;margin-bottom:8px}
          .mk{width:54px;height:54px;border-radius:12px;background:conic-gradient(from 210deg,var(--gold),#7c611f 55%,var(--gold));display:grid;place-items:center;color:#000;font-weight:800;font-size:26px;box-shadow:0 0 0 1px rgba(231,181,74,.4)}
          h1{font-size:26px;color:#fff;letter-spacing:1px}
          .sub{font-size:11px;letter-spacing:3px;color:#5f7193;text-transform:uppercase;margin-bottom:34px}
          .cards{display:grid;grid-template-columns:repeat(3,minmax(240px,300px));gap:18px}
          @media(max-width:820px){.cards{grid-template-columns:1fr}}
          a.card{display:block;text-decoration:none;color:inherit;background:linear-gradient(180deg,#0a111f,#080d18);border:1px solid rgba(150,170,205,.2);border-radius:16px;padding:24px;transition:.18s}
          a.card:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 18px 50px -20px rgba(0,0,0,.8)}
          .ic{font-size:30px;margin-bottom:14px}
          .ct{font-size:16px;font-weight:800;color:#fff;margin-bottom:6px}
          .cd{font-size:11.5px;color:#8294b4;line-height:1.6}
          .go{margin-top:14px;font-size:11px;font-weight:700;color:var(--gold)}
          .foot{margin-top:36px;font-size:10px;color:#5f7193;text-align:center;line-height:1.7}
          </style></head><body>
          <div class="brand"><div class="mk">A</div><div><h1>AURUM&nbsp;SUITE</h1></div></div>
          <div class="sub">KID Digital Wealth · Trading & Research</div>
          <div class="cards">
            <a class="card" href="./market-analysis.html"><div class="ic" style="color:var(--blue)">▦</div>
              <div class="ct">Market Analysis</div>
              <div class="cd">Dashboard multi-asset: heatmap, rating tecnico, correlazioni, Fear &amp; Greed, top movers, calendario economico.</div>
              <div class="go">Apri →</div></a>
            <a class="card" href="./gold-silver-terminal.html"><div class="ic" style="color:var(--gold)">◆</div>
              <div class="ct">Gold / Silver Terminal</div>
              <div class="cd">Trading desk: grafico a candele, order book, ticket con sizing, posizioni con P&amp;L live, gold/silver ratio.</div>
              <div class="go">Apri →</div></a>
            <a class="card" href="./confluence-helper.html"><div class="ic" style="color:var(--green)">◇</div>
              <div class="ct">Confluence Helper</div>
              <div class="cd">Checklist top-down multi-timeframe: scoring di confluenza, bias LONG/SHORT/NO-TRADE, livelli e nota operativa.</div>
              <div class="go">Apri →</div></a>
          </div>
          <div class="foot">App single-file · dati simulati in v1 · nessun consiglio d'investimento<br/>© KID Digital Wealth</div>
          </body></html>
          HTML
          echo "Contenuto _site:" && ls -la _site

      - name: Configura Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Carica artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy su Pages
        id: deployment
        uses: actions/deploy-pages@v4
