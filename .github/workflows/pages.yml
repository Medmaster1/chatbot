name: Deploy AURUM Suite to GitHub Pages

# Pubblica le app single-file su GitHub Pages.
# Copia tutti gli HTML del progetto e genera una landing (index.html)
# che raccoglie i tre siti come "AURUM Suite".
on:
  push:
    branches: [main]
    paths:
      - "*.html"
      - "assets/**"
      - .github/workflows/pages.yml
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Una sola deploy concorrente; non annullare quelle in corso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepara contenuto del sito
        run: |
          mkdir -p _site
          # Copia tutte le pagine (app single-file + vetrina) e gli asset condivisi.
          # La index.html del repo (launcher + nav vetrina) viene usata cosi' com'e'.
          cp ./*.html _site/ 2>/dev/null || true
          [ -d ./assets ] && cp -r ./assets _site/ || true
          [ -f ./.nojekyll ] && cp ./.nojekyll _site/ || true
          echo "Contenuto _site:" && ls -la _site


      - name: Configura Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Carica artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy su Pages
        id: deployment
        uses: actions/deploy-pages@v4
