<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="app">

  <!-- ======================== SIDEBAR ======================== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">📈</div>
      <div class="logo-text">
        <div class="logo-name">Terminal</div>
        <div class="logo-sub">Pro Dashboard</div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Built dynamically by app.js -->
    </nav>

    <div class="sidebar-bottom">
      <div class="sidebar-clock" id="sidebar-clock"></div>
      <div id="sidebar-username" style="font-size:11px;color:var(--text-secondary);margin-top:3px;font-weight:500"></div>
      <div style="font-size:10px;color:var(--text-muted);margin-top:1px">Private Dashboard v1.0</div>
    </div>
  </aside>

  <!-- ======================== MAIN ======================== -->
  <main class="main">
    <header class="topbar">
      <div id="page-title" style="font-size:15px;font-weight:600;flex:1">Loading…</div>
      <div class="topbar-right">
        <div class="market-pill" id="market-status-pill">
          <div class="dot dot-neutral"></div>
          <span>—</span>
        </div>
        <div id="topbar-time"></div>
      </div>
    </header>

    <div class="page-content" id="app-content">
      <div class="loading"><div class="spinner"></div> Initializing…</div>
    </div>
  </main>

</div>

<!-- ======================== SCRIPTS ======================== -->
<script src="js/api.js"></script>
<script src="js/pages/settings.js"></script><!-- load first so getSettings() is available -->
<script src="js/pages/overview.js"></script>
<script src="js/pages/markets.js"></script>
<script src="js/pages/feargreed.js"></script>
<script src="js/pages/scanner.js"></script>
<script src="js/pages/seasonality.js"></script>
<script src="js/pages/patterns.js"></script>
<script src="js/pages/fundamentals.js"></script>
<script src="js/pages/statements.js"></script>
<script src="js/pages/cot.js"></script>
<script src="js/pages/news.js"></script>
<script src="js/pages/political.js"></script>
<script src="js/pages/portfolio.js"></script>
<script src="js/pages/watchlist.js"></script>
<script src="js/pages/alerts.js"></script>
<script src="js/pages/screener.js"></script>
<script src="js/pages/defi.js"></script>
<script src="js/pages/journal.js"></script>
<script src="js/app.js"></script>

</body>
</html>
