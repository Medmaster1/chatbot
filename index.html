<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial Terminal</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="app">
  <!-- ======================== SIDEBAR ======================== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">📈</div>
      <div class="logo-text">
        <div class="logo-name">Terminal</div>
        <div class="logo-sub">Pro Dashboard</div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Built dynamically by app.js -->
    </nav>

    <div class="sidebar-bottom">
      <div class="sidebar-clock" id="sidebar-clock"></div>
      <div style="font-size:10px;margin-top:2px">v1.0 — Private Use</div>
    </div>
  </aside>

  <!-- ======================== MAIN ======================== -->
  <main class="main">
    <!-- Top Bar -->
    <header class="topbar">
      <div id="page-title" style="font-size:15px;font-weight:600">Loading…</div>

      <div class="topbar-right">
        <!-- Market Status -->
        <div class="market-pill" id="market-status-pill">
          <div class="dot dot-neutral"></div>
          <span>Checking…</span>
        </div>

        <!-- Clock -->
        <div id="topbar-time" style="font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text-secondary);min-width:76px;text-align:right"></div>
      </div>
    </header>

    <!-- Page Content -->
    <div class="page-content" id="app-content">
      <div class="loading">
        <div class="spinner"></div>
        Initializing…
      </div>
    </div>
  </main>
</div>

<!-- ======================== SCRIPTS ======================== -->
<!-- Core API module -->
<script src="js/api.js"></script>

<!-- Page modules -->
<script src="js/pages/overview.js"></script>
<script src="js/pages/markets.js"></script>
<script src="js/pages/feargreed.js"></script>
<script src="js/pages/scanner.js"></script>
<script src="js/pages/seasonality.js"></script>
<script src="js/pages/patterns.js"></script>
<script src="js/pages/fundamentals.js"></script>
<script src="js/pages/statements.js"></script>
<script src="js/pages/cot.js"></script>
<script src="js/pages/news.js"></script>
<script src="js/pages/political.js"></script>
<script src="js/pages/portfolio.js"></script>

<!-- App router (must be last) -->
<script src="js/app.js"></script>

</body>
</html>
